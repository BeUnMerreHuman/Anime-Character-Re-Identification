task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# Crucial: 1 class (Character), not 80 (COCO)
num_classes: 1
remap_mscoco_category: False

train_dataloader: 
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: dataset/images
    ann_file: dataset/train_annotations.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 2
  drop_last: True 
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: dataset/images
    ann_file: dataset/val_annotations.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~ 
  shuffle: False
  num_workers: 2
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction