[project]
name = "anime-character-re-identification"
version = "0.1.0"
description = "Anime Character Re-Identification System"
readme = "README.md"
requires-python = ">=3.11,<3.14"  
dependencies = [
    "calflops>=0.3.2",
    "faiss-cpu>=1.13.2",
    "faster-coco-eval>=1.6.7",
    "gradio>=6.13.0",
    "huggingface-hub>=1.11.0",
    "lancedb>=0.30.2",
    "numpy>=2.1.0",
    "opencv-python>=4.13.0.92",
    "pillow>=12.2.0",
    "plotly>=6.7.0",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.3",
    "safetensors>=0.7.0",
    "scipy>=1.17.1",
    "tensorboard>=2.20.0",
    "torch==2.5.1",
    "torchaudio>=2.11.0",
    "torchvision==0.20.1",
    "transformers>=5.5.4",
    "umap-learn>=0.5.12",
]

[tool.uv]
index-strategy = "unsafe-best-match"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }
